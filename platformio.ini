; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; https://docs.platformio.org/en/latest/projectconf/sections/env/options/monitor/index.html


[platformio]
default_envs = arduino_uno

[env:arduino_uno]
platform = atmelavr
board = uno
framework = arduino
lib_deps = 
	sparkfun/SparkFun AS3935 Lightning Detector Arduino Library@^1.4.9
	epsilonrt/EepromSecureData@^0.1.1
	contrem/arduino-timer@^3.0.1
	philj404/SimpleSerialShell@^1.0.0
monitor_speed = 115200
monitor_echo = true
monitor_filters = default, send_on_enter

[env:arduino_mega]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_deps = 
	sparkfun/SparkFun AS3935 Lightning Detector Arduino Library@^1.4.9
	epsilonrt/EepromSecureData@^0.1.1
	contrem/arduino-timer@^3.0.1
	philj404/SimpleSerialShell@^1.0.0
monitor_speed = 115200
monitor_echo = true
monitor_filters = default, send_on_enter
